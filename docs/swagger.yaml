info:
  contact: {}
  description: Getstarvio backend API documentation.
  title: Getstarvio Backend API
  version: "1.0"
paths:
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/auth/google/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Google login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.AuthGoogleLoginRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.AuthTokenResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
      summary: Login with Google
      tags:
      - auth
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Logout payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.AuthLogoutRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.OKResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
      summary: Logout
      tags:
      - auth
  /v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.AuthRefreshRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.AuthTokenResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
      summary: Refresh access token
      tags:
      - auth
  /v1/billing/history:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.BillingHistoryResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Billing history
      tags:
      - billing
  /v1/billing/subscription/activate:
    post:
      description: Simulated activation in v1.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.OKResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponseDoc'
      security:
      - BearerAuth: []
