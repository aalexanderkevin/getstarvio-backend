version: '3.8'

services:
  app:
    build:
      context: .
    command: ["/app/getstarvio", "server"]
    env_file:
      - .env
    ports:
      - "${SERVICE_PORT:-8080}:${SERVICE_PORT:-8080}"
    depends_on:
      - db

  worker:
    build:
      context: .
    command: ["/app/getstarvio", "worker"]
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-getstarvio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
