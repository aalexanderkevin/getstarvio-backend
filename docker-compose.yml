services:
  app:
    image: getstarvio-backend:local
    build:
      context: .
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /var/log/getstarvio && /app/getstarvio server 2>&1 | tee -a /var/log/getstarvio/app.log",
      ]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "${SERVICE_PORT:-8080}:${SERVICE_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs/app:/var/log/getstarvio

  worker:
    image: getstarvio-backend:local
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /var/log/getstarvio && /app/getstarvio worker 2>&1 | tee -a /var/log/getstarvio/worker.log",
      ]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs/worker:/var/log/getstarvio

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-getstarvio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-getstarvio}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
